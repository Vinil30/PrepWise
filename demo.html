<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Elevate Interview | HR Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0f1c2e;
      --navy-mid: #1a2d44;
      --navy-light: #243a55;
      --blue: #2563eb;
      --blue-soft: #3b82f6;
      --accent: #06b6d4;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --text-primary: #e2eaf4;
      --text-muted: #7a9abf;
      --red: #ef4444;
      --red-dark: #b91c1c;
      --green: #10b981;
      --radius: 1.4rem;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: auto;
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37,99,235,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 55%);
    }

    .interview-dashboard {
      max-width: 1520px;
      width: 100%;
      height: 92vh;
      min-height: 640px;
      background: rgba(15,28,46,0.92);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
      display: flex;
      overflow: hidden;
    }

    /* ───── LEFT PANEL ───── */
    .video-panel {
      width: 290px;
      min-width: 260px;
      background: linear-gradient(180deg, rgba(26,45,68,0.95) 0%, rgba(15,28,46,0.98) 100%);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1.25rem;
      gap: 1.2rem;
    }

    /* interviewer card */
    .interviewer-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.4rem 1rem;
      text-align: center;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .hr-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid rgba(37,99,235,0.5);
      box-shadow: 0 0 0 6px rgba(37,99,235,0.1), 0 12px 24px -8px rgba(0,0,0,0.5);
      display: block;
      background: var(--navy-mid);
    }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--blue-soft);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .pulse-ring.active {
      opacity: 1;
      animation: pulseRing 1.8s infinite ease-out;
    }
    @keyframes pulseRing {
      0%   { transform: scale(0.95); opacity: 0.7; }
      60%  { transform: scale(1.12); opacity: 0; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .live-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      background: var(--green);
      border-radius: 50%;
      border: 2px solid var(--navy-mid);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .interviewer-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 3px 10px;
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.35);
      color: #93c5fd;
      border-radius: 30px;
      margin-top: 6px;
    }

    /* user cam */
    .user-cam-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 0.9rem;
    }

    .cam-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cam-label span { color: var(--red); font-size: 0.65rem; }

    #user-cam {
      width: 100%;
      border-radius: 0.9rem;
      background: var(--navy);
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    /* ── session info ── */
    .session-info {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .session-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }
    .session-value { font-size: 0.78rem; color: var(--text-primary); font-weight: 600; }

    /* ── END INTERVIEW BUTTON — redesigned ── */
    .end-section {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .end-btn {
      width: 100%;
      background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(185,28,28,0.18));
      border: 1.5px solid rgba(239,68,68,0.4);
      padding: 13px 20px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: #fca5a5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      cursor: pointer;
      transition: all 0.22s ease;
      letter-spacing: 0.1px;
      position: relative;
      overflow: hidden;
    }
    .end-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(185,28,28,0.25));
      opacity: 0;
      transition: opacity 0.22s;
    }
    .end-btn:hover {
      border-color: rgba(239,68,68,0.75);
      color: #fff;
      box-shadow: 0 0 28px -6px rgba(239,68,68,0.45), 0 4px 12px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }
    .end-btn:hover::before { opacity: 1; }
    .end-btn:active { transform: translateY(0px); }

    .end-btn-icon {
      width: 28px;
      height: 28px;
      background: rgba(239,68,68,0.22);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: background 0.22s;
    }
    .end-btn:hover .end-btn-icon {
      background: rgba(239,68,68,0.38);
    }

    .end-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.7;
      letter-spacing: 0.2px;
    }

    /* ───── RIGHT PANEL ───── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 1.3rem 2rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(26,45,68,0.4);
      flex-shrink: 0;
    }

    .chat-header-left h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    .chat-header-right {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.6rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .message-wrap { display: flex; flex-direction: column; animation: msgIn 0.25s cubic-bezier(0.2,0.9,0.4,1.1); }
    @keyframes msgIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

    .message-wrap.hr-wrap { align-items: flex-start; }
    .message-wrap.user-wrap { align-items: flex-end; }

    .message-meta {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding: 0 4px;
      letter-spacing: 0.3px;
    }

    .message-bubble {
      max-width: 76%;
      padding: 0.85rem 1.25rem;
      border-radius: 1.4rem;
      font-size: 0.9rem;
      line-height: 1.55;
      font-weight: 400;
      word-break: break-word;
    }

    .bubble-hr {
      background: linear-gradient(135deg, rgba(37,99,235,0.25), rgba(59,130,246,0.15));
      border: 1px solid rgba(59,130,246,0.2);
      color: #c7dcf9;
      border-bottom-left-radius: 0.4rem;
    }

    .bubble-user {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.07));
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-bottom-right-radius: 0.4rem;
    }

    /* ───── INPUT AREA — redesigned with resizable textarea ───── */
    .input-area {
      padding: 1rem 1.5rem 1.3rem;
      background: rgba(15,28,46,0.8);
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      flex-shrink: 0;
    }

    .textarea-wrapper {
      position: relative;
      width: 100%;
    }

    #user-input {
      width: 100%;
      min-height: 52px;
      max-height: 180px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--text-primary);
      outline: none;
      resize: vertical;           /* ← user-resizable vertically */
      line-height: 1.55;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      /* Custom resize handle styling */
      resize: vertical;
    }

    #user-input::placeholder { color: rgba(122,154,191,0.6); }

    #user-input:focus {
      border-color: rgba(59,130,246,0.55);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* resize handle indicator strip */
    .textarea-wrapper::after {
      content: '';
      position: absolute;
      bottom: 5px;
      right: 8px;
      width: 20px;
      height: 3px;
      border-top: 1px solid rgba(255,255,255,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
      border-radius: 2px;
    }

    .input-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .char-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-right: auto;
      opacity: 0.6;
      user-select: none;
    }

    .action-btn {
      border: none;
      padding: 10px 22px;
      border-radius: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.1px;
    }

    .btn-send {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 4px 14px -4px rgba(37,99,235,0.5);
    }
    .btn-send:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -6px rgba(37,99,235,0.55);
    }
    .btn-send:active { transform: translateY(0); }

    .btn-voice {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }
    .btn-voice:hover {
      background: rgba(16,185,129,0.25);
      border-color: rgba(16,185,129,0.55);
      transform: translateY(-1px);
    }
    .btn-voice.listening {
      background: rgba(16,185,129,0.3);
      border-color: var(--green);
      color: #fff;
      animation: voicePulse 1.2s infinite;
    }
    @keyframes voicePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }

    /* loading overlay */
    .glass-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,12,20,0.75);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .glass-overlay.active { opacity: 1; visibility: visible; }

    .report-card {
      background: var(--navy-mid);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 40px 60px rgba(0,0,0,0.4);
    }
    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top: 3px solid var(--blue-soft);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .report-card p {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    .report-card .sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 400;
    }

    /* responsive */
    @media (max-width: 820px) {
      .interview-dashboard { flex-direction: column; height: auto; min-height: 100dvh; }
      .video-panel { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 1rem; padding: 1rem; min-width: unset; }
      .chat-panel { flex: none; height: 60vh; }
      .end-section { margin-top: 0; width: 100%; }
      .message-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<div class="interview-dashboard">

  <!-- ── LEFT PANEL ── -->
  <div class="video-panel">

    <div class="interviewer-card">
      <div class="avatar-wrapper">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="HR James" class="hr-avatar" id="hrAvatar">
        <div class="pulse-ring" id="audioPulse"></div>
        <div class="live-dot"></div>
      </div>
      <div class="interviewer-name">James Whitmore</div>
      <div class="badge">Senior Talent Partner</div>
    </div>

    <div class="user-cam-card">
      <div class="cam-label"><span>●</span> You — Candidate</div>
      <video id="user-cam" autoplay muted playsinline></video>
    </div>

    <div class="session-info">
      <div class="session-row">
        <span class="session-label">Session</span>
        <span class="session-value" id="sessionId">#EL-2024</span>
      </div>
      <div class="session-row">
        <span class="session-label">Duration</span>
        <span class="session-value" id="sessionTimer">00:00</span>
      </div>
      <div class="session-row">
        <span class="session-label">Status</span>
        <span class="session-value" style="color:#6ee7b7">In Progress</span>
      </div>
    </div>

    <!-- END INTERVIEW — redesigned button -->
    <div class="end-section">
      <button class="end-btn" id="endInterviewBtn">
        <span class="end-btn-icon">⏹</span>
        End Interview &amp; Get Report
      </button>
      <p class="end-hint">Your performance report will be generated</p>
    </div>

  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-left">
        <h2>🎙 Live Interview <span class="live-badge">Live</span></h2>
      </div>
      <div class="chat-header-right">Voice + Text enabled</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <!-- INPUT AREA — resizable textarea + action row -->
    <div class="input-area">
      <div class="textarea-wrapper">
        <textarea
          id="user-input"
          placeholder="Type your answer here… (Shift+Enter for new line, Enter to send)"
          rows="2"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
      </div>
      <div class="input-actions">
        <span class="char-hint">Drag bottom-right corner to resize</span>
        <button class="action-btn btn-voice" id="voiceBtn">🎤 Voice</button>
        <button class="action-btn btn-send" id="sendBtn">Send ↑</button>
      </div>
    </div>
  </div>
</div>

<div class="glass-overlay" id="loadingOverlay">
  <div class="report-card">
    <div class="spinner-ring"></div>
    <p>📊 Crafting your interview analysis…</p>
    <p class="sub">This usually takes a few seconds</p>
  </div>
</div>

<script>
  const chatContainer   = document.getElementById('chatMessages');
  const userInputField  = document.getElementById('user-input');
  const sendBtn         = document.getElementById('sendBtn');
  const voiceBtn        = document.getElementById('voiceBtn');
  const endBtn          = document.getElementById('endInterviewBtn');
  const loadingOverlay  = document.getElementById('loadingOverlay');
  const audioPulse      = document.getElementById('audioPulse');
  const sessionTimer    = document.getElementById('sessionTimer');
  const sessionId       = document.getElementById('sessionId');

  // random session ID
  sessionId.textContent = '#EL-' + Math.floor(1000 + Math.random() * 9000);

  // session timer
  let seconds = 0;
  setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    sessionTimer.textContent = `${m}:${s}`;
  }, 1000);

  // state
  let recognition = null, isListening = false, accumulatedTranscript = '';
  let silenceTimeout = null, restartRecognitionTimer = null;
  let isAILoading = false, isSpeakingNow = false, currentUtterance = null;
  const SILENCE_MS = 4000, RESTART_INTERVAL_MS = 38000;

  function addMessage(senderName, text, type) {
    const wrap = document.createElement('div');
    wrap.classList.add('message-wrap', type === 'hr' ? 'hr-wrap' : 'user-wrap');
    const meta = document.createElement('div');
    meta.classList.add('message-meta');
    meta.textContent = `${senderName} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    const bubble = document.createElement('div');
    bubble.classList.add('message-bubble', type === 'hr' ? 'bubble-hr' : 'bubble-user');
    bubble.textContent = text;
    wrap.appendChild(meta);
    wrap.appendChild(bubble);
    chatContainer.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return wrap;
  }

  function initWebcam() {
    const v = document.getElementById('user-cam');
    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { width:640, height:480, facingMode:'user' } })
        .then(s => { v.srcObject = s; })
        .catch(e => console.warn('cam:', e));
    }
  }

  function speakMessage(text) {
    return new Promise(resolve => {
      if (isSpeakingNow) { window.speechSynthesis.cancel(); if (currentUtterance) currentUtterance.onend = null; }
      const clean = text.replace(/\([^)]*\)/g,'').replace(/I'll wait.*?\./gi,'').trim();
      if (!clean) { isSpeakingNow = false; isAILoading = false; resolve(); return; }
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'en-GB'; u.rate = 0.98; u.pitch = 1.05;
      const setVoice = () => {
        const vs = window.speechSynthesis.getVoices();
        const pref = vs.find(v => v.name === 'Google UK English Male') ||
                     vs.find(v => v.lang === 'en-GB' && v.name.includes('Male')) ||
                     vs.find(v => v.lang === 'en-GB');
        if (pref) u.voice = pref;
      };
      if (window.speechSynthesis.getVoices().length) setVoice();
      else window.speechSynthesis.onvoiceschanged = () => setVoice();
      u.onstart  = () => { isSpeakingNow = true;  audioPulse.classList.add('active'); };
      u.onend    = () => { isSpeakingNow = false; isAILoading = false; audioPulse.classList.remove('active'); resolve(); };
      u.onerror  = () => { isSpeakingNow = false; isAILoading = false; audioPulse.classList.remove('active'); resolve(); };
      currentUtterance = u;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    });
  }

  async function sendUserMessage(messageText) {
    if (isAILoading || isSpeakingNow) { addMessage('System', 'Please wait — interviewer is responding…', 'hr'); return false; }
    const msg = messageText.trim();
    if (!msg) return false;
    userInputField.value = '';
    accumulatedTranscript = '';
    addMessage('You', msg, 'user');
    isAILoading = true;
    try {
      const res  = await fetch('/ask', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`message=${encodeURIComponent(msg)}` });
      const data = await res.json();
      if (!data.reply) throw new Error('empty');
      let reply = data.reply.replace(/\([^)]*\)/g,'').replace(/I'll wait.*?\./gi,'').replace(/No pressure.*?\./gi,'').trim();
      if (!reply) reply = "Thank you for sharing that. Could you elaborate a little more?";
      addMessage('James (HR)', reply, 'hr');
      await speakMessage(reply);
      isAILoading = false;
      return true;
    } catch(e) {
      addMessage('System', 'Connection issue — please try again.', 'hr');
      isAILoading = false; return false;
    }
  }

  function stopListening(reset=true) {
    clearTimeout(silenceTimeout); clearTimeout(restartRecognitionTimer);
    if (recognition) { try{recognition.abort();}catch(e){} recognition.onend=null; try{recognition.stop();}catch(e){} }
    isListening = false; if (reset) accumulatedTranscript = '';
    audioPulse.classList.remove('active');
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤 Voice';
  }

  function resetSilenceTimer() {
    clearTimeout(silenceTimeout);
    silenceTimeout = setTimeout(() => {
      if (isListening && accumulatedTranscript.trim()) {
        const msg = accumulatedTranscript.trim(); accumulatedTranscript = '';
        stopListening(true); sendUserMessage(msg);
      } else if (isListening) {
        addMessage('System','No speech detected. Tap Voice again.','hr'); stopListening(true);
      }
    }, SILENCE_MS);
  }

  function startVoiceInput() {
    if (isAILoading || isSpeakingNow) { addMessage('System','Interviewer is speaking — please wait.','hr'); return; }
    if (isListening) { stopListening(true); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { addMessage('System','Voice not supported in this browser.','hr'); return; }
    accumulatedTranscript = '';
    recognition = new SR();
    recognition.lang = 'en-GB'; recognition.continuous = true; recognition.interimResults = true;
    recognition.onstart = () => {
      isListening = true;
      audioPulse.classList.add('active');
      voiceBtn.classList.add('listening');
      voiceBtn.textContent = '🔴 Stop';
      addMessage('🎤 System','Listening… speak clearly','hr');
      resetSilenceTimer();
      restartRecognitionTimer = setTimeout(() => { if (isListening) { stopListening(false); startVoiceInput(); } }, RESTART_INTERVAL_MS);
    };
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const chunk = e.results[i][0].transcript;
        if (e.results[i].isFinal) accumulatedTranscript += chunk + ' ';
        else interim += chunk;
      }
      userInputField.value = accumulatedTranscript + interim;
      resetSilenceTimer();
    };
    recognition.onerror = (e) => { addMessage('System',`Voice error: ${e.error}`,'hr'); stopListening(true); };
    recognition.onend = () => {
      if (isListening) {
        if (accumulatedTranscript.trim()) { const m=accumulatedTranscript.trim(); accumulatedTranscript=''; stopListening(true); sendUserMessage(m); }
        else stopListening(true);
      }
    };
    try { recognition.start(); } catch(e) { console.error(e); }
  }

  function forceSendFromInput() {
    if (isAILoading || isSpeakingNow) { addMessage('System','Please wait for the interviewer to finish.','hr'); return; }
    const msg = userInputField.value.trim() || accumulatedTranscript.trim();
    if (!msg) return;
    if (isListening) stopListening(true);
    sendUserMessage(msg);
  }

  async function endInterviewFlow() {
    if (isSpeakingNow) window.speechSynthesis.cancel();
    if (isListening) stopListening(true);
    loadingOverlay.classList.add('active');
    try {
      const res  = await fetch('/generate-report', { method:'POST' });
      const data = await res.json();
      if (data.status === 'success') window.location.href = '/report';
      else throw new Error(data.message || 'Report error');
    } catch(e) {
      addMessage('System','❌ Failed to generate report. Please try again.','hr');
      loadingOverlay.classList.remove('active');
    }
  }

  window.addEventListener('load', () => {
    initWebcam();
    setTimeout(() => {
      addMessage('James (HR)', "Hello! Welcome to your Elevate Interview. I'm James, your talent partner. Could you please introduce yourself and tell me about your background?", 'hr');
      setTimeout(() => speakMessage("Hello! Welcome to your Elevate Interview. I'm James, your talent partner. Could you please introduce yourself and tell me about your background?"), 400);
    }, 400);

    sendBtn.addEventListener('click', forceSendFromInput);
    voiceBtn.addEventListener('click', startVoiceInput);
    endBtn.addEventListener('click', endInterviewFlow);

    userInputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); forceSendFromInput(); }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (isSpeakingNow) window.speechSynthesis.cancel(); if (isListening) stopListening(true); }
    });

    if (window.speechSynthesis) window.speechSynthesis.getVoices();
  });

  window.addEventListener('beforeunload', () => {
    if (recognition) recognition.abort();
    window.speechSynthesis.cancel();
  });
</script>
</body>
</html>
